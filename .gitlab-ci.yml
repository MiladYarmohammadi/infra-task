stages:
  - unit test
  - package
  - test
  - production

variables:
  APP_VERSION: $CI_PIPELINE_IID
  FORMER_IMAGE_NAME: 0


.prepare:
  script:
    - cp .env.example .env
    - sed -i "s/APP_KEY=.*/APP_KEY=$APP_KEY/" .env
    - sed -i "s/REDIS_HOST=.*/REDIS_HOST=$REDIS_HOST/" .env
    - sed -i "s/BITPIN_VERSION/$APP_VERSION/" resources/views/welcome.blade.php

unit test:
  image: php:8.2-alpine
  stage: unit test
  extends:
    - .prepare
  before_script:
    - apk --no-cache add autoconf build-base curl
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - pecl install redis && docker-php-ext-enable redis
    - composer install
  script:
    - php artisan test

build docker image:
  stage: package
  image: docker:27.0.3
  services:
    - docker:27.0.3-dind
  extends:
    - .prepare
  script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
    - docker build -t $CI_REGISTRY_IMAGE -t $CI_REGISTRY_IMAGE:$APP_VERSION -t $DOCKER_REGISTRY_IMAGE -t $DOCKER_REGISTRY_IMAGE:$APP_VERSION .
    - 'if [ ! -z $CI_COMMIT_TAG ]; then docker tag $CI_REGISTRY_IMAGE:latest $CI_REGISTRY_IMAGE:prod; fi'
    - docker push --all-tags $CI_REGISTRY_IMAGE
    - echo $DOCKER_REGISTRY_PASSWORD | docker login -u $DOCKER_REGISTRY_USERNAME --password-stdin
    - docker push --all-tags $DOCKER_REGISTRY_IMAGE

test docker image:
  image: curlimages/curl
  stage: test
  allow_failure: true
  services:
    - name: $CI_REGISTRY_IMAGE:$APP_VERSION
      alias: website
  script:
    - curl http://website:8000 | grep "BitPin Task"

deploy to kubernetes:
  stage: production
  image: alpine
#  when: manual
#  rules:
#    - if: '$CI_COMMIT_TAG'
  variables:
    APP_NAME: infra-task-app-1
  before_script:
    - apk add openssh-client
    - mkdir -p ~/.ssh
    - eval $(ssh-agent -s)
    - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
    - chmod 600 $SSH_PRIVATE_KEY
    - ssh-add $SSH_PRIVATE_KEY
  script:
    - ssh $PRODUCTION_SERVER "echo $DOCKER_REGISTRY_PASSWORD | docker login -u $DOCKER_REGISTRY_USERNAME --password-stdin"
    - FORMER_IMAGE_NAME=$(docker inspect --format='{{.Config.Image}}' "$APP_NAME " 2>/dev/null || echo Not Found!)
    #    - ssh $PRODUCTION_SERVER microk8s kubectl set image deployment.apps $APP_NAME *=$DOCKER_REGISTRY_IMAGE:$APP_VERSION  # Kubernetes Version
    - echo $PRODUCTION_SERVER
    - echo $FORMER_IMAGE_NAME
    - scp docker-compose.yml.example $PRODUCTION_SERVER:/tmp/docker-compose.yml
    - ssh $PRODUCTION_SERVER "cd /tmp && docker compose pull && docker compose up -d"

